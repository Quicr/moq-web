<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoQ Web Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #9ca3af; margin-bottom: 2rem; }
    .apps { display: grid; gap: 1rem; }
    .app {
      background: #1f2937;
      border-radius: 0.5rem;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
    }
    .app:hover { background: #374151; }
    .app h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .app p { color: #9ca3af; font-size: 0.875rem; }
    .tag {
      display: inline-block;
      background: #3b82f6;
      color: white;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MoQ Web Apps</h1>
    <p class="subtitle">Demo applications for Media over QUIC technologies</p>

    <div class="apps">
      <a href="./msf-compression-benchmark/" class="app">
        <h2>MSF Compression Benchmark</h2>
        <p>Test GZIP compression effectiveness on MSF catalogs, media timelines, and event timelines. Visualize compression ratios and savings for different data sizes and formats.</p>
        <span class="tag">MSF</span>
      </a>
    </div>
  </div>
</body>
</html>
