name: Deploy Branch Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'jitter-overhaul'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Branch
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}branches/${{ github.event.inputs.branch }}/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch to build
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build branch
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/branches/${{ github.event.inputs.branch }}/

      - name: Save branch build
        run: mkdir -p branch-build && mv packages/client/dist branch-build/${{ github.event.inputs.branch }}

      - name: Checkout main for full build
        uses: actions/checkout@v4
        with:
          ref: main
          clean: false

      - name: Install main dependencies
        run: pnpm install --frozen-lockfile

      - name: Build main (draft-16)
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Setup combined output
        run: mv packages/client/dist dist-combined

      - name: Clean for draft-14 rebuild
        run: pnpm run clean

      - name: Build draft-14
        run: pnpm run build:draft-14
        env:
          BASE_URL: /${{ github.event.repository.name }}/14/

      - name: Combine all builds
        run: |
          mv packages/client/dist dist-combined/14
          mkdir -p dist-combined/branches
          mv branch-build/${{ github.event.inputs.branch }} dist-combined/branches/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-combined

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
