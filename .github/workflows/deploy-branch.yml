name: Deploy Branch Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'dts'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Branch
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}branches/${{ github.event.inputs.branch }}/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch to build
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build branch
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/branches/${{ github.event.inputs.branch }}/

      - name: Save branch build
        run: mkdir -p branch-build && mv packages/client/dist branch-build/${{ github.event.inputs.branch }}

      - name: Checkout main for full build
        uses: actions/checkout@v4
        with:
          ref: main
          clean: false

      - name: Install main dependencies
        run: pnpm install --frozen-lockfile

      - name: Build main (draft-16)
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Setup combined output
        run: mv packages/client/dist dist-combined

      - name: Clean for draft-14 rebuild
        run: pnpm run clean

      - name: Build draft-14
        run: pnpm run build:draft-14
        env:
          BASE_URL: /${{ github.event.repository.name }}/14/

      - name: Add draft-14 to combined
        run: mv packages/client/dist dist-combined/14

      - name: Download existing gh-pages to preserve other branches
        run: |
          mkdir -p dist-combined/branches
          # Clone just the gh-pages branch (shallow) to get existing branch builds
          git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }}.git gh-pages-existing || true
          # Copy existing branches (if any) except the one we're rebuilding
          if [ -d "gh-pages-existing/branches" ]; then
            for dir in gh-pages-existing/branches/*/; do
              branch_name=$(basename "$dir")
              if [ "$branch_name" != "${{ github.event.inputs.branch }}" ]; then
                echo "Preserving existing branch: $branch_name"
                cp -r "$dir" "dist-combined/branches/"
              fi
            done
          fi
          rm -rf gh-pages-existing

      - name: Add new branch build
        run: mv branch-build/${{ github.event.inputs.branch }} dist-combined/branches/

      - name: List deployed branches
        run: |
          echo "Branches that will be deployed:"
          ls -la dist-combined/branches/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-combined

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
