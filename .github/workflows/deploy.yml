name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build draft-16 (default)
        run: pnpm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Build auth-demo
        run: |
          if [ -d apps/auth-demo ]; then
            cd apps/auth-demo
            pnpm vite build --base /${{ github.event.repository.name }}/auth-demo/
          fi

      - name: Save draft-16 build
        run: |
          mv packages/client/dist dist-combined
          if [ -d apps/auth-demo/dist ]; then
            mv apps/auth-demo/dist dist-combined/auth-demo
          fi

      - name: Build apps
        run: |
          for app in apps/*/; do
            if [ -f "$app/package.json" ]; then
              (cd "$app" && pnpm build)
            fi
          done
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Copy apps to dist
        run: |
          mkdir -p dist-combined/apps
          cp apps/index.html dist-combined/apps/
          for app in apps/*/; do
            if [ -d "$app/dist" ]; then
              appname=$(basename "$app")
              cp -r "$app/dist" "dist-combined/apps/$appname"
            fi
          done

      - name: Clean for draft-14 rebuild
        run: pnpm run clean

      - name: Build draft-14
        run: pnpm run build:draft-14
        env:
          BASE_URL: /${{ github.event.repository.name }}/14/

      - name: Combine builds
        run: mv packages/client/dist dist-combined/14

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-combined

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
